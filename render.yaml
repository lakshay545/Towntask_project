services:
  # Backend + Frontend (Single Service - Free Tier)
  - type: web
    name: localwork-app
    runtime: node
    buildCommand: "cd backend && npm install && cd ../frontend && npm install --legacy-peer-deps && npm run build"
    startCommand: "cd backend && NODE_ENV=production node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: PORT
        value: 5000
