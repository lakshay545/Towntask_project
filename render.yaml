services:
  # Backend API service (Frontend is deployed separately on Vercel)
  - type: web
    name: localwork-backend
    runtime: node
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "NODE_ENV=production node server.js"
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your deployed Vercel URL (e.g. https://towntaskproject.vercel.app)
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
